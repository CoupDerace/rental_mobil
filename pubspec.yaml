name: rental_mobil
description: Aplikasi Rental Mobil berbasis Flutter.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ==========================
  # STATE MANAGEMENT
  # ==========================
  provider: ^6.1.5
  flutter_riverpod: ^2.3.6

  # ==========================
  # ROUTER
  # ==========================
  go_router: ^16.0.0

  # ==========================
  # SUPABASE
  # ==========================
  supabase_flutter: ^2.9.1

  # ==========================
  # LOCAL STORAGE
  # ==========================
  shared_preferences: ^2.5.3

  # ==========================
  # DATE & NUMBER
  # ==========================
  intl: ^0.20.2

  # ==========================
  # SVG
  # ==========================
  flutter_svg: ^2.2.0

  # ==========================
  # IMAGE PICKER
  # ==========================
  image_picker: ^1.2.0

  # ==========================
  # NETWORK IMAGE
  # ==========================
  cached_network_image: ^3.4.1

  # ==========================
  # CONNECTIVITY
  # ==========================
  connectivity_plus: ^7.1.1

  # ==========================
  # LOADING
  # ==========================
  flutter_spinkit: ^5.2.2

  # ==========================
  # ICON
  # ==========================
  iconsax_flutter: ^1.0.1

  # ==========================
  # ANIMATION
  # ==========================
  lottie: ^3.0.0

  # ==========================
  # PDF
  # ==========================
  pdf: ^3.11.3

  printing: ^5.14.2

  # ==========================
  # EXCEL
  # ==========================
  excel: ^4.0.6

  # ==========================
  # PATH
  # ==========================
  path_provider: ^2.1.5

  # ==========================
  # DEPENDENCY INJECTION
  # ==========================
  get_it: ^8.2.0

  # ==========================
  # URL
  # ==========================
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  open_filex: ^4.7.0
  flutter_local_notifications: ^20.1.0
  workmanager: ^0.9.0+3
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4

  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/logos/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true

  image_path: assets/icons/app_icon.png

  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"

  image: assets/logos/logo_rent.jpg

  android: true
  ios: true

  android_12:
    color: "#000000"

    image: assets/logos/logo_rent.jpg
